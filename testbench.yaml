# https://packages.tools/getting-started/configuration.html
laravel: '@testbench'

providers:
  - Workbench\App\Providers\WorkbenchServiceProvider

migrations:
  - workbench/database/migrations

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

workbench:
  start: '/'
  install: true
  welcome: false
  health: false
  auth: true
  #user: test@example.com
  #guard: web
  discovers:
    web: true
    api: true
    config: false
    factories: true
    commands: true
    components: false
    views: false
  build:
    - asset-publish
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
    - package-name:install
  assets:
    - laravel-assets
  sync:
    - from: storage
      to: workbench/storage
    - from: public
      to: workbench/public
      reverse: true
